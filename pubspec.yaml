name: absensi_king_royal
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.2.1
  excel: ^4.0.6
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.jpg
    - assets/icons/profile_empty.png
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.jpg
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/app_icon.jpg
